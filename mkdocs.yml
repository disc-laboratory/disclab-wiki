site_name: DISCLab Wiki
site_description: Internal knowledge base and operating handbook for the Digital Intelligence for Structures and Construction Lab
site_author: DISCLab
site_url: https://disc-laboratory.github.io/disclab-wiki/
repo_url: https://github.com/disc-laboratory/disclab-wiki
repo_name: disc-laboratory/disclab-wiki
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 DISCLab

theme: #readthedocs
    name: 'material'
    #name: 'rtd-dropdown'
#  name: material
#  language: en
#  features:
#    - navigation.tabs
#    - navigation.sections
#    - navigation.expand
#    - navigation.top
#    - search.suggest
#    - search.highlight
#    - content.code.copy
#    - content.action.edit
#    - content.tabs.link
#    - toc.follow
#  palette:
#    - scheme: default
#      primary: blue grey
#      accent: deep orange
#      toggle:
#        icon: material/brightness-7
#        name: Switch to dark mode
#    - scheme: slate
#      primary: blue grey
#      accent: deep orange
#      toggle:
#        icon: material/brightness-4
#        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR-USERNAME
    - icon: fontawesome/brands/google-scholar
      link: https://scholar.google.com/

